name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore: [ main ]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LoanMS.API/LoanMS.API.csproj

      - name: Build API
        run: dotnet build LoanMS.API/LoanMS.API.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test LoanMS.Tests/LoanMS.Tests.csproj -c Release --verbosity normal
