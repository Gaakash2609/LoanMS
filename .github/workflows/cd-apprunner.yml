name: CD - AWS App Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: apprunner-prod-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  APPRUNNER_SERVICE_ARN: ${{ vars.APPRUNNER_SERVICE_ARN }}

jobs:
  deploy:
    name: Build image and deploy to App Runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          for v in AWS_REGION ECR_REPOSITORY APPRUNNER_SERVICE_ARN; do
            if [[ -z "${!v:-}" ]]; then
              echo "Missing required repository variable: $v"
              exit 1
            fi
          done

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" \
            --image-scanning-configuration scanOnPush=true >/dev/null

      - name: Build and push image
        id: image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker build -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Update App Runner service to new image
        shell: bash
        run: |
          set -euo pipefail
          aws apprunner update-service \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --source-configuration "ImageRepository={ImageIdentifier=${{ steps.image.outputs.image_uri }},ImageRepositoryType=ECR,ImageConfiguration={Port=8080}},AutoDeploymentsEnabled=false"

      - name: Wait for App Runner deployment to finish
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for App Runner service to become RUNNING..."
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APPRUNNER_SERVICE_ARN" \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS"
            if [[ "$STATUS" == "RUNNING" ]]; then
              echo "Deployment succeeded."
              exit 0
            fi
            if [[ "$STATUS" == "CREATE_FAILED" || "$STATUS" == "DELETE_FAILED" ]]; then
              echo "Deployment failed with status $STATUS"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for RUNNING status."
          exit 1

      - name: Show service URL
        shell: bash
        run: |
          set -euo pipefail
          aws apprunner describe-service \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --query 'Service.ServiceUrl' --output text
