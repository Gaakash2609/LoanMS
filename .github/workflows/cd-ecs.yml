name: CD - ECS Fargate

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ecs-prod-deploy
  cancel-in-progress: false

env:
  AWS_REGION:        ${{ vars.AWS_REGION }}
  ECR_REPOSITORY:    ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER:       ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE:       ${{ vars.ECS_SERVICE }}
  CONTAINER_NAME:    loanms-api
  TASK_DEF_FILE:     ecs-task-def.json

jobs:
  deploy:
    name: Build and deploy to ECS Fargate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          for v in AWS_REGION ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE; do
            if [[ -z "${!v:-}" ]]; then
              echo "ERROR: Missing required GitHub variable: $v"
              exit 1
            fi
          done

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --image-scanning-configuration scanOnPush=true >/dev/null

      - name: Build and push Docker image
        id: image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker build -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "Pushed image: $IMAGE_URI"

      - name: Render new ECS task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1.9.0
        with:
          task-definition: ${{ env.TASK_DEF_FILE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-def@df9643952318728e6ae0786df99023a60d520b86  # v2.3.3
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15
