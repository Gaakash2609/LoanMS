name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [ main ]

env:
  APP_PORT: 8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push image to ECR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:gh-${{ github.sha }}

      - name: Prepare Dockerrun (single container)
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:gh-${{ github.sha }}
          mkdir -p eb-deploy
          cat > eb-deploy/Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": 1,
            "Image": { "Name": "${IMAGE_URI}", "Update": "true" },
            "Ports": [ { "ContainerPort": "${{ env.APP_PORT }}" } ]
          }
          EOF
          cd eb-deploy && zip -r ../deploy.zip .

      - name: Upload application version to S3
        env:
          EB_S3_BUCKET: ${{ secrets.EB_S3_BUCKET }}
        run: |
          VERSION_LABEL=gh-${{ github.sha }}
          aws s3 cp deploy.zip s3://${EB_S3_BUCKET}/deploys/${VERSION_LABEL}.zip

      - name: Create Elastic Beanstalk application version
        env:
          EB_APP_NAME: ${{ secrets.EB_APP_NAME }}
          EB_S3_BUCKET: ${{ secrets.EB_S3_BUCKET }}
        run: |
          VERSION_LABEL=gh-${{ github.sha }}
          aws elasticbeanstalk create-application-version \
            --application-name ${EB_APP_NAME} \
            --version-label ${VERSION_LABEL} \
            --source-bundle S3Bucket=${EB_S3_BUCKET},S3Key=deploys/${VERSION_LABEL}.zip

      - name: Update Elastic Beanstalk environment
        env:
          EB_APP_NAME: ${{ secrets.EB_APP_NAME }}
          EB_ENV_NAME: ${{ secrets.EB_ENV_NAME }}
        run: |
          VERSION_LABEL=gh-${{ github.sha }}
          aws elasticbeanstalk update-environment --environment-name ${EB_ENV_NAME} --version-label ${VERSION_LABEL}

      - name: Wait for environment update
        env:
          EB_ENV_NAME: ${{ secrets.EB_ENV_NAME }}
        run: |
          echo "Waiting for environment to finish updating..."
          aws elasticbeanstalk wait environment-updated --environment-names $EB_ENV_NAME
