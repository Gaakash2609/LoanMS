# ── Production override ───────────────────────────────────────────────────────
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.9'

services:
  loanms:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Provider=postgresql
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
